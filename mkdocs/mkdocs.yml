site_name: 2026.1_PI1_Grupo1_Lui
site_url: https://fcte-pi1.github.io/2026.1_PI1_Grupo1_Lui/
theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: green

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: green
    - scheme: high-contrast
      primary: black
      accent: yellow
      toggle:
        icon: material/weather-cloudy-alert
        name: Switch to high contrast
extra_css:
  - stylesheets/organograma.css
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: 
      - Visão Geral: index.md
      - Equipe: equipe.md 
  - Manual: manual.md
  - Eletronica:
      - Home: eletronica/index.md
      - Requisitos: eletronica/RequisitosEletronica.md
      - Componentes:
          - Microcontrolador: eletronica/microcontrolador.md
          - Sensores: eletronica/analiseSensores.md
          - Motor: eletronica/Motor.md
  - Energia: 
      - Home: energia/index.md
      - Requisitos: energia/requisitos.md
  - Estruturas: 
      - Home: estruturas/index.md
      - Requisitos: estruturas/Elicitacao_Requisitos_Estrutura_Navegacao.md
  - Software: 
      - Home: software/index.md
      - Documentação: software/requisitosSoftware.md
      - Front-end: software/avaliacao-tecnologias-frontend.md
      - Back-end: software/stackBackend.md
