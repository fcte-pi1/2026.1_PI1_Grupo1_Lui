site_name: 2026.1_PI1_Grupo1_Lui
site_url: https://fcte-pi1.github.io/2026.1_PI1_Grupo1_Lui/
theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: green

    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
      primary: green
    - scheme: high-contrast
      primary: black
      accent: yellow
      toggle:
        icon: material/weather-cloudy-alert
        name: Switch to high contrast

nav:
  - Home: index.md
  - Eletronica: eletronica/index.md
  - Energia: energia/index.md
  - Estruturas: estruturas/index.md
  - Software: software/index.md
  - Manual Git/Github: 
      - Objetivo: manual/index.md
      - Estratégia de Branches: manual/branches.md
      - Commits: manual/commits.md
      - Envio de Alterações: manual/envio-alteracoes.md
      - Pull Request (PR): manual/pull-request.md
      - Fluxo de Pull Request: manual/fluxo-pr.md
      - Revisão e Merge: manual/revisao-merge.md
      - Comandos Git: manual/comandos-git.md
      - Boas Práticas: manual/boas-praticas.md
      - Resumo: manual/resumo.md
